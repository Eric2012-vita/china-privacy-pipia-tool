<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Privacy Policy Generator v2 | LegalAIPay</title>
<style>
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;max-width:920px;margin:0 auto;padding:24px;color:#1a1a1a;line-height:1.6}
h1{font-size:1.5rem}h2{font-size:1.15rem;margin-top:1.6em}
.market-pick{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0}
.market-pick button{padding:12px 18px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:1rem}
.market-pick button.active{border-color:#0a66c2;background:#eaf3fb;font-weight:600}
.panel{display:none}.panel.active{display:block}
label{display:block;margin:10px 0 4px;font-weight:600}
input,select,textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box;font-size:.95rem}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.9rem}
th,td{border:1px solid #ddd;padding:6px;text-align:left;vertical-align:top}
th{background:#f5f7fa}
td input{border:none;padding:4px}
.row-actions{margin:8px 0}
.row-actions button{margin-right:8px;padding:6px 12px;border:1px solid #0a66c2;background:#fff;color:#0a66c2;border-radius:6px;cursor:pointer}
.primary{padding:10px 18px;background:#0a66c2;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem;margin:12px 8px 12px 0}
.note{background:#fff8e1;border:1px solid #ffe082;padding:10px 14px;border-radius:8px;margin:12px 0;font-size:.9rem}
.disclaimer{color:#666;font-size:.85rem;border-top:1px solid #eee;margin-top:24px;padding-top:12px}
#output{white-space:pre-wrap;background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;padding:16px;margin-top:16px}
.import-status{font-size:.9rem;margin:8px 0}
.import-status.ok{color:#1b7f3b}.import-status.warn{color:#b26a00}
</style>
<script src="/la-paywall.js"></script>
</head>
<body>
<h1>Privacy Policy Generator <small>v2</small></h1>
<p>请先选择适用市场 / Select the applicable market first.</p>

<div class="market-pick">
  <button data-market="cn" class="active">中国大陆 · PIPL</button>
  <button data-market="eu">EU / UK · GDPR</button>
